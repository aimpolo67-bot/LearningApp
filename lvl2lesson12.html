        #progress-wrapper { width: 100%; height: 8px; background: var(--border); border-radius: 4px; margin-bottom: 10px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: #2ecc71; transition: width 0.3s ease; }
        #streak-display { font-size: 1.2rem; margin-bottom: 5px; min-height: 1.5rem; }
        .level-header { background: #2c3e50; color: white; padding: 10px; border-radius: 10px; margin-bottom: 5px; font-weight: bold; }
        .progress-sub { font-size: 0.85rem; color: var(--text-main); margin-bottom: 15px; background: var(--section-bg); padding: 5px; border-radius: 5px; font-weight: bold; }
        .display-area { margin: 15px 0; min-height: 3rem; border-bottom: 2px solid var(--border); padding-bottom: 10px; }

        .pinyin-display { font-size: 1rem; color: var(--text-sub); font-style: italic; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .scrambled-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 20px; }
        button { padding: 12px; border: 2px solid #3498db; background: var(--card-bg); color: var(--text-main); border-radius: 10px; cursor: pointer; font-size: 0.95rem; transition: 0.1s; outline: none; }
        .btn-correct { background: #2ecc71 !important; color: white !important; border-color: #27ae60 !important; }
        .btn-wrong { background: #e74c3c !important; color: white !important; border-color: #c0392b !important; }
        #feedback { margin-top: 15px; font-weight: bold; min-height: 45px; padding: 10px; border-radius: 10px; line-height: 1.4; }
        #user-build { color: #2980b9; font-size: 1.2rem; font-style: italic; margin: 10px 0; min-height: 2.5rem; border: 1px dashed #3498db; padding: 10px; border-radius: 5px; background: var(--section-bg); display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 5px; }
        #lvl3-controls { margin-top: 25px; display: flex; justify-content: center; gap: 10px; }
        .next-btn { background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; display: none; }
        .menu-btn { background: #3498db; color: white; font-size: 1.1rem; border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-bottom: 10px; width: 100%; cursor: pointer; }
        .home-btn { margin-top: 25px; background: #95a5a6; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #summary-screen { display: none; padding: 20px; }
        .stat-circle { width: 100px; height: 100px; border-radius: 50%; border: 5px solid #2ecc71; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; margin: 10px auto; color: #2ecc71; }
        #star-rating { font-size: 2.5rem; color: #f1c40f; margin-bottom: 10px; letter-spacing: 5px; }
        #review-container { margin-top: 20px; text-align: left; background: var(--section-bg); padding: 15px; border-radius: 10px; border: 1px solid var(--border); max-height: 200px; overflow-y: auto; }
        .review-item { margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.3s ease-in-out; }

        /* --- NEW: SPEED CONTROL STYLES --- */
        .speed-control-box {
            background: var(--section-bg);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;

            border: 1px solid var(--border);
        }
        .speed-slider { width: 120px; cursor: pointer; }

        /* --- FLASHCARD SPECIFIC STYLES --- */
        #study-screen { display: none; padding: 10px; max-height: 80vh; overflow-y: auto; }
        .flashcard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .flashcard { background: var(--section-bg); height: 110px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); position: relative; padding: 10px; transition: background 0.2s; }
        .flashcard:active { background: var(--border); }
        .flashcard-content { font-weight: bold; font-size: 1.1rem; text-align: center; }
        .study-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .study-speaker-btn { background: none; border: none; font-size: 1.1rem; color: #3498db; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="quiz-container">
        <div id="menu-screen">
            <h2 id="app-title" style="color: var(--text-main);">Level 2 Lesson 12: 在餐厅 (Zài Cāntǐng) - စားသောက်ဆိုင်မှာ</h2>
            <div id="main-menu">
                <button class="menu-btn" onclick="goToLevel(1)">Shēngcí (生词)</button>

        <div id="game-screen" style="display:none;">
            <div id="progress-wrapper"><div id="progress-fill"></div></div>
            
            <div class="speed-control-box">
                <span>🐢</span>
                <input type="range" min="0.5" max="1.5" step="0.1" value="0.7" class="speed-slider" id="global-speed-game" oninput="syncSpeed(this.value)">

            <div id="streak-display"></div>
            <div class="level-header" id="level-tag">--</div>
            <div class="progress-sub" id="progress-info">--</div>
            
            <div id="level-1-2-ui" class="fade-in">
                <div class="display-area">
                    <div class="chinese-display">
                        <span id="cn-q">--</span>
                        <button class="speaker-btn" onclick="speakText()">🔊</button>
                    </div>
                    <div class="pinyin-display" id="py-q">--</div>
                </div>
            </div>

            <div id="level-3-ui" style="display:none;" class="fade-in">
                <div style="color: var(--text-sub); font-size: 1.1rem; margin-bottom: 5px;" id="cn-hint-text"></div>
                <div style="color: var(--text-main); font-size: 1.4rem; font-weight: bold; margin-bottom: 10px;">
                    <span id="mm-hint">--</span>
                    <button class="speaker-btn" onclick="speakText(true)">🔊</button>
                </div>
                <div id="user-build"></div>
            </div>

            <div class="options-grid" id="options"></div>
            <div class="scrambled-grid" id="scrambled-words"></div>
            
            <div id="lvl3-controls" style="display:none;">
                <button class="undo-btn" onclick="undoLast()">Undo</button>
                <button class="reset-btn" onclick="resetSentence()">Reset</button>
                <button class="hint-btn" onclick="showHint()">Hint</button>
            </div>

            <div id="feedback"></div>
            <button id="next-btn" class="next-btn" onclick="autoNext()">Next Question ➔</button>
            <button class="home-btn" onclick="showMainMenu()">🏠 Back to Lesson Menu</button>
        </div>

        <div id="summary-screen">
            <h2 style="color: var(--text-main);">Lesson Finished!</h2>
            <div id="star-rating"></div>
            <div class="stat-circle" id="accuracy-pct">0%</div>
            <p id="summary-stats" style="color: var(--text-sub); line-height: 1.6;"></p>
            
            <div id="review-container" style="display:none;">
                <div style="font-weight: bold; margin-bottom: 10px; color: #e74c3c;">Review Mistakes:</div>
                <div id="review-list"></div>
                <button class="retry-btn" onclick="retryMistakes()">Retry Mistakes Only</button>
            </div>

            <button class="menu-btn" onclick="showMainMenu()" style="margin-top:15px;">Back to Lesson Menu</button>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="home-icon-btn">🏠</a>
    </div>

<script>
    const currentTheme = localStorage.getItem('theme');
    if (currentTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

    const CONFIG = {
    title: "Level 2 Lesson 12: 在餐厅 (Zài Cāntǐng) - စားသောက်ဆိုင်မှာ",
    vocab: [
        { cn: "煎", py: "jiān", mm: "(v) ဆီနည်းနည်းဖြင့်ကြော်သည်" },
        { cn: "炒", py: "chǎo", mm: "(v) ဆီသတ်၍ကြော်သည်" },
        { cn: "炸", py: "zhá", mm: "(v) ဆီများများပူပူတွင်နှစ်ကြော်သည်" },
        { cn: "烤", py: "kǎo", mm: "(v) ကင်သည် / ဖုတ်သည်" },
        { cn: "包间", py: "bāojiān", mm: "(n) သီးသန့်အခန်း" },

        { cn: "特色", py: "tèsè", mm: "(n) အထူး" },
        { cn: "酸辣鱼", py: "suānlàyú", mm: "(n) ငါးချဉ်စပ်" },

        { cn: "蘑菇", py: "mógū", mm: "(n) မှို" },
        { cn: "空心菜", py: "kòngxīncài", mm: "(n) ကန်စွန်းရွက်" },
        { cn: "糖醋", py: "tángcù", mm: "(n) ချိုချဉ်" },
        { cn: "排骨", py: "páigǔ", mm: "(n) နံရိုး" },
        { cn: "西红柿", py: "xīhóngshì", mm: "(n) ခရမ်းချဉ်သီး" },
        { cn: "鸡蛋汤", py: "jīdàntāng", mm: "(n) ကြက်ဥဟင်းရည်" },
        { cn: "啤酒", py: "píjiǔ", mm: "(n) ဘီယာ" },
        { cn: "稍等", py: "shāoděng", mm: "(v) ခဏစောင့်ပါ (polite)" },
        { cn: "生意", py: "shēngyi", mm: "(n) အရောင်းအဝယ်" },
         { cn: "海鲜", py: "hǎixiān", mm: "(n) ပင်လယ်စာ" },
                { cn: "麻婆豆腐", py: "mápó dòufu", mm: "မာဖော်တိုဖူး" },
                { cn: "烤鸭", py: "kǎoyā", mm: "ဘဲကင်" },
                { cn: "凉拌海带", py: "liángbàn hǎidài", mm: "ပင်လယ်ရေညှိသုပ်" },
    ],
    sentences: [
        { 
            cn: "欢迎光临，请问几位？", 
            py: "Huānyíng guānglín, qǐngwèn jǐ wèi?", 
            mm: "ကြိုဆိုပါတယ်၊ ကျေးဇူးပြု၍ မေးပါရစေ ဘယ်နှစ်ယောက်လဲခင်ဗျာ?", 
            pyParts: [{w:"Huānyíng"}, {w:"guānglín,"}, {w:"qǐngwèn"}, {w:"jǐ wèi?"}] 
        },
        { 
            cn: "不好意思，包间客满了。", 
            py: "Bù hǎoyìsi, bāojiān kèmǎn le.", 
            mm: "စိတ်မရှိပါနဲ့၊ သီးသန့်အခန်းတွေ ပြည့်သွားပါပြီ။", 
            pyParts: [{w:"Bù hǎoyìsi,"}, {w:"bāojiān"}, {w:"kèmǎn"}, {w:"le."}] 
        },
        { 
            cn: "你们的特色菜是什么？", 
            py: "Nǐmen de tèsècài shì shénme?", 
            mm: "ခင်ဗျားတို့ဆိုင်ရဲ့ အထူးဟင်းလျာက ဘာလဲ?", 
            pyParts: [{w:"Nǐmen de"}, {w:"tèsècài"}, {w:"shì"}, {w:"shénme?"}] 
        },
        { 
            cn: "来一份烤鸭、麻婆豆腐、凉拌海带。", 
            py: "Lái yífèn kǎoyā, mápó dòufu, liángbàn hǎidài.", 
            mm: "ဘဲကင်တစ်ပွဲ၊ မာဖိုတိုဖူးနဲ့ ပင်လယ်ရေညှိသုပ် တစ်ပွဲ ပေးပါ။", 
            pyParts: [{w:"Lái"}, {w:"yífèn"}, {w:"kǎoyā,"}, {w:"mápó dòufu,"}, {w:"liángbàn"}, {w:"hǎidài."}] 
        },
        { 
            cn: "我点一个蘑菇炒空心菜。", 
            py: "Wǒ diǎn yí ge mógū chǎo kòngxīncài.", 
            mm: "ကျွန်တော် မှိုနဲ့ ကန်စွန်းရွက်ကြော် တစ်ပွဲ မှာပါမယ်။", 
            pyParts: [{w:"Wǒ"}, {w:"diǎn"}, {w:"yí ge"}, {w:"mógū"}, {w:"chǎo"}, {w:"kòngxīncài."}] 
        },
        { 
            cn: "要喝点儿什么吗？", 
            py: "Yào hē diǎnr shénme ma?", 
            mm: "ဘာသောက်ဖို့ မှာဦးမလဲ?", 
            pyParts: [{w:"Yào"}, {w:"hē"}, {w:"diǎnr"}, {w:"shénme"}, {w:"ma?"}] 
        },
        { 
            cn: "这家店的生意很好。", 
            py: "Zhè jiā diàn de shēngyi hěn hǎo.", 
            mm: "ဒီဆိုင်က အရောင်းအဝယ် အရမ်းကောင်းတာပဲ။", 
            pyParts: [{w:"Zhè jiā"}, {w:"diàn de"}, {w:"shēngyi"}, {w:"hěn"}, {w:"hǎo."}] 
        },
        { 
            cn: "这辣子鸡的味道怎么样？", 
            py: "Zhè làzǐjī de wèidào zěnmeyàng?", 
            mm: "ဒီကြက်သားစပ်ကြော်ရဲ့ အရသာက ဘယ်လိုလဲ?", 
            pyParts: [{w:"Zhè"}, {w:"làzǐjī de"}, {w:"wèidào"}, {w:"zěnmeyàng?"}] 
        },
        { 
            cn: "我们特色菜是酸辣鱼。", 
            py: "Wǒmen tèsècài shì suānlàyú.", 
            mm: "ကျွန်ုပ်တို့ရဲ့ အထူးဟင်းလျာက ငါးချဉ်စပ်ပါ။", 
            pyParts: [{w:"Wǒmen"}, {w:"tèsècài"}, {w:"shì"}, {w:"suānlàyú."}] 
        },
        { 
            cn: "请问附近有海鲜店吗？", 
            py: "Qǐngwèn fùjìn yǒu hǎixiāndiàn ma?", 
            mm: "ကျေးဇူးပြု၍ မေးပါရစေ အနီးအနားမှာ ပင်လယ်စာဆိုင် ရှိပါသလား?", 
            pyParts: [{w:"Qǐngwèn"}, {w:"fùjìn"}, {w:"yǒu"}, {w:"hǎixiāndiàn"}, {w:"ma?"}] 
        },
        { 
            cn: "今天中午我吃了炒饭。", 
            py: "Jīntiān zhōngwǔ wǒ chīle chǎofàn.", 
            mm: "ဒီနေ့နေ့လည်က ကျွန်တော် ထမင်းကြော် စားခဲ့တယ်။", 
            pyParts: [{w:"Jīntiān"}, {w:"zhōngwǔ"}, {w:"wǒ"}, {w:"chīle"}, {w:"chǎofàn."}] 
        },
        { 
            cn: "给我们来一份糖醋排骨。", 
            py: "Gěi wǒmen lái yífèn tángcù páigǔ.", 
            mm: "ကျွန်တော်တို့အတွက် ချိုချဉ်နံရိုးတစ်ပွဲ ပေးပါ။", 
            pyParts: [{w:"Gěi"}, {w:"wǒmen"}, {w:"lái"}, {w:"yífèn"}, {w:"tángcù"}, {w:"páigǔ."}] 
        }
    ]
};
    let currentLevel = 1, pool = [], currentIndex = 0, currentItem = {}, buildResult = [], canClick = true;
    let errorCount = 0, correctCount = 0, currentStreak = 0, maxStreak = 0, startTime = 0, missedItems = [], initialPoolSize = 0;
    let currentSpeechRate = 0.7;

    // --- SPEED SYNC LOGIC ---
    function syncSpeed(val) {
        currentSpeechRate = parseFloat(val);
        document.getElementById('global-speed-study').value = val;
        document.getElementById('global-speed-game').value = val;
    }

    // --- TTS FUNCTION (MANUAL SPEED) ---
    function speakCustom(text) {
        window.speechSynthesis.cancel();
        setTimeout(() => {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'zh-CN';
            msg.rate = currentSpeechRate; // Uses value from slider
            msg.pitch = 1.0;
            window.speechSynthesis.speak(msg);
        }, 50);
    }

    // --- FLASHCARD LOGIC ---
    function showStudyMode() {
        document.getElementById('menu-screen').style.display = "none";
        document.getElementById('study-screen').style.display = "block";
        const list = document.getElementById('flashcard-list');
        list.innerHTML = "";
        CONFIG.vocab.forEach(item => {
            const card = document.createElement('div');
            card.className = "flashcard";
            const content = document.createElement('div');
            content.className = "flashcard-content";
            content.innerHTML = `${item.cn}<br><small>${item.py}</small>`;
            const speaker = document.createElement('button');
            speaker.className = "study-speaker-btn";
            speaker.innerHTML = "🔊 Hear";
            speaker.onclick = (e) => { e.stopPropagation(); speakCustom(item.cn); };
            card.onclick = () => {
                if (content.innerHTML.includes(item.cn)) content.innerHTML = `<span style="color: #3498db;">${item.mm}</span>`;
                else content.innerHTML = `${item.cn}<br><small>${item.py}</small>`;
            };
            card.appendChild(content); card.appendChild(speaker); list.appendChild(card);
        });
    }

    function showMainMenu() {
        document.getElementById('menu-screen').style.display = "block";
        document.getElementById('study-screen').style.display = "none";
        document.getElementById('game-screen').style.display = "none";
        document.getElementById('summary-screen').style.display = "none";
    }

    function speakText(isSentence = false) { speakCustom(currentItem.cn); }

    function retryMistakes() {
        pool = shuffleArray([...missedItems]); initialPoolSize = pool.length;
        currentIndex = 0; errorCount = 0; missedItems = [];
        document.getElementById('summary-screen').style.display = "none";
        document.getElementById('game-screen').style.display = "block";
        updateQuestion();
    }
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }
    function triggerShake() {
        const container = document.getElementById('quiz-container');
        container.classList.add('shake');
        setTimeout(() => container.classList.remove('shake'), 300);
    }
    function goToLevel(lvl) {
        currentLevel = lvl; currentIndex = 0; errorCount = 0; correctCount = 0; currentStreak = 0; maxStreak = 0;
        missedItems = []; startTime = Date.now();
        document.getElementById('menu-screen').style.display = "none";
        document.getElementById('game-screen').style.display = "block";
        let rawPool = (lvl === 1) ? [...CONFIG.vocab] : [...CONFIG.sentences];
        pool = shuffleArray(rawPool);
        initialPoolSize = pool.length;
        if (lvl === 1) document.getElementById('level-tag').innerText = "Shēngcí (生词)";
        else if (lvl === 2) document.getElementById('level-tag').innerText = "Duìhuà (对话)";
        else document.getElementById('level-tag').innerText = "Páijùzi (排句子)";
        document.getElementById('lvl3-controls').style.display = (lvl === 3) ? "flex" : "none";
        updateQuestion();
    }
    function updateQuestion() {
        canClick = true; document.getElementById('next-btn').style.display = "none";
        const fb = document.getElementById('feedback'); fb.innerText = ""; fb.className = "";
        document.getElementById('user-build').innerHTML = ""; document.getElementById('options').innerHTML = "";
        document.getElementById('scrambled-words').innerHTML = ""; document.getElementById('cn-hint-text').innerText = "";
        buildResult = [];
        const progressPct = Math.min(((currentIndex) / initialPoolSize) * 100, 99);
        document.getElementById('progress-fill').style.width = progressPct + "%";
        document.getElementById('progress-info').innerText = `Item: ${currentIndex + 1} / ${pool.length}`;
        currentItem = pool[currentIndex];
        if (currentLevel < 3) {
            document.getElementById('level-1-2-ui').style.display = "block";
            document.getElementById('level-3-ui').style.display = "none";
            document.getElementById('cn-q').innerText = currentItem.cn;
            document.getElementById('py-q').innerText = currentItem.py;
            renderOptions();
        } else {
            document.getElementById('level-1-2-ui').style.display = "none";
            document.getElementById('level-3-ui').style.display = "block";
            document.getElementById('mm-hint').innerText = currentItem.mm;
            renderScramble();
        }
    }
    function renderOptions() {
        let choices = [currentItem.mm];
        let wrongSource = (currentLevel === 1) ? CONFIG.vocab : CONFIG.sentences;
        let wrongOptions = wrongSource.filter(item => item.mm !== currentItem.mm);
        shuffleArray(wrongOptions);
        while (choices.length < 4 && wrongOptions.length > 0) {
            let r = wrongOptions.pop().mm;
            if (!choices.includes(r)) choices.push(r);
        }
        shuffleArray(choices);
        choices.forEach(c => {
            const b = document.createElement('button');
            b.innerText = c; b.onclick = () => handleChoice(c, b);
            document.getElementById('options').appendChild(b);
        });
    }
    function handleChoice(selected, btn) {
        if (!canClick) return;
        canClick = false;
        const allBtns = document.querySelectorAll('#options button');
        const fb = document.getElementById('feedback');
        if (selected === currentItem.mm) {
            btn.classList.add('btn-correct'); fb.className = "feedback-correct"; fb.innerHTML = `<span>Correct! ✓</span>`;
            correctCount++; updateStreak(true);
        } else {
            btn.classList.add('btn-wrong'); allBtns.forEach(b => { if (b.innerText === currentItem.mm) b.classList.add('btn-correct'); });
            triggerShake(); errorCount++;
            if (!missedItems.some(i => i.cn === currentItem.cn)) missedItems.push(currentItem);
            updateStreak(false); fb.className = "feedback-wrong-box";
            fb.innerHTML = `<span>✘ Wrong</span><br><small>Correct: ${currentItem.mm}</small>`;
        }
        document.getElementById('next-btn').style.display = "block";
    }
    function renderScramble() {
        let pinyinParts = shuffleArray(currentItem.pyParts.map((obj, i) => ({w: obj.w, id: i})));
        pinyinParts.forEach(partObj => {
            const b = document.createElement('button');
            b.innerText = partObj.w; b.className = `pinyin-part`;
            b.onclick = () => {
                if(!canClick || b.disabled) return;
                b.disabled = true; buildResult.push(partObj.w);
                const slot = document.createElement('span'); slot.innerText = partObj.w;
                document.getElementById('user-build').appendChild(slot);
                if (buildResult.length === currentItem.pyParts.length) checkSentence();
            };
            document.getElementById('scrambled-words').appendChild(b);
        });
    }
    function checkSentence() {
        canClick = false;
        const userStr = buildResult.join(" ").replace(/\s+([,.!?])/g, '$1');
        const correctStr = currentItem.pyParts.map(p => p.w).join(" ").replace(/\s+([,.!?])/g, '$1');
        const fb = document.getElementById('feedback');
        if (userStr === correctStr) {
            fb.className = "feedback-correct"; fb.innerHTML = `<span>Correct! ✓</span>`;
            correctCount++; updateStreak(true);
        } else {
            triggerShake(); errorCount++;
            if (!missedItems.some(i => i.cn === currentItem.cn)) missedItems.push(currentItem);
            updateStreak(false); fb.className = "feedback-wrong-box";
            fb.innerHTML = `<span>✘ Wrong Order</span><br><small>${correctStr}</small>`;
        }
        document.getElementById('next-btn').style.display = "block";
    }
    function autoNext() { currentIndex++; if (currentIndex < pool.length) updateQuestion(); else showSummary(); }
    function updateStreak(isCorrect) {
        if (isCorrect) {
            currentStreak++; if (currentStreak > maxStreak) maxStreak = currentStreak;
            if (currentStreak >= 3) document.getElementById('streak-display').innerText = `🔥 ${currentStreak} Streak!`;
        } else {
            currentStreak = 0; document.getElementById('streak-display').innerText = "";
        }
    }
    function undoLast() {
        if (!canClick || buildResult.length === 0) return;
        const lastWord = buildResult.pop();
        const display = document.getElementById('user-build'); display.removeChild(display.lastChild);
        const btns = document.querySelectorAll('#scrambled-words button');
        for (let b of btns) { if (b.innerText === lastWord && b.disabled) { b.disabled = false; break; } }
    }
    function resetSentence() {
        if (!canClick) return; buildResult = []; document.getElementById('user-build').innerHTML = "";
        document.querySelectorAll('#scrambled-words button').forEach(b => b.disabled = false);
    }
    function showHint() { document.getElementById('cn-hint-text').innerText = currentItem.cn; }
    function showSummary() {
        document.getElementById('game-screen').style.display = "none";
        document.getElementById('summary-screen').style.display = "block";
        const accuracy = Math.round((initialPoolSize / (initialPoolSize + errorCount)) * 100) || 0;
        document.getElementById('accuracy-pct').innerText = accuracy + "%";
        document.getElementById('star-rating').innerText = accuracy === 100 ? "⭐⭐⭐" : accuracy >= 70 ? "⭐⭐" : accuracy >= 50 ? "⭐" : "Try Again!";
        document.getElementById('summary-stats').innerHTML = `Mistakes: ${errorCount}<br>Streak: ${maxStreak}`;
        if (missedItems.length > 0) {
            document.getElementById('review-container').style.display = "block";
            const list = document.getElementById('review-list'); list.innerHTML = "";
            missedItems.forEach(item => {
                const div = document.createElement('div'); div.className = "review-item";
                div.innerHTML = `<b>${item.cn}</b><br><small>${item.mm}</small>`;
                list.appendChild(div);
            });
        } else { document.getElementById('review-container').style.display = "none"; }
    }
    showMainMenu();
</script>
