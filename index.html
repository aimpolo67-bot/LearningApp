<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESC Chinese - Level 2</title>
    <style>
        /* Layout */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        /* Menu Container */
        .menu-container { 
            background: white; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: none; 
        }

        .menu-container::-webkit-scrollbar {
            display: none;
        }

        h1 { 
            color: #2c3e50; 
            margin-bottom: 25px; 
            font-size: 1.6rem;
            border-bottom: 2px solid #3498db;
            display: inline-block;
            padding-bottom: 10px;
        }

        /* Lesson Buttons */
        .menu-btn { 
            background: #3498db; 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 15px; 
            font-weight: bold; 
            margin-bottom: 15px; 
            width: 100%; 
            cursor: pointer; 
            text-decoration: none; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.05rem; 
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .menu-btn:hover { 
            background: #2980b9; 
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .menu-btn:active {
            transform: translateY(1px);
        }

        .lesson-num {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
        }

        .footer { 
            margin-top: 25px; 
            color: #bdc3c7; 
            font-size: 0.85rem; 
            font-weight: bold;
            border-top: 1px solid #eee;
            padding-top: 15px;
            line-height: 1.6;
        }

        .progress-text {
            color: #3498db;
        }
    </style>
</head>
<body>

<div class="menu-container">
    <h1>Level 2 Lessons</h1>
    
    <a href="lvl2lesson1.html" class="menu-btn">
        <span> (Ŕihŕo) - </span>
        <span class="lesson-num">L-1</span>
    </a>

    <a href="lvl2lesson2.html" class="menu-btn">
        <span> (Wčnlů) - </span>
        <span class="lesson-num">L-2</span>
    </a>

    <a href="lvl2lesson3.html" class="menu-btn">
        <span> (D diŕnhuŕ) - </span>
        <span class="lesson-num">L-3</span>
    </a>

    <div class="footer">
        Created by GESC student<br>
        <span class="progress-text">Progress: 3 / 14 Lessons</span>
    </div>
</div>

</body>
</html>
