<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESC Chinese - Level 2</title>
    <style>
        /* --- ALL ORIGINAL STYLES REMAIN --- */
        :root { --bg-color: #f0f2f5; --container-bg: white; --text-color: #2c3e50; --subtitle-color: #7f8c8d; --btn-bg: #3498db; --btn-hover: #2980b9; --progress-bg: #e0e0e0; --section-bg: #f8f9fa; --border-color: #eee; }
        [data-theme="dark"] { --bg-color: #1a1a1a; --container-bg: #2d2d2d; --text-color: #ecf0f1; --subtitle-color: #bdc3c7; --btn-bg: #2980b9; --btn-hover: #3498db; --progress-bg: #444; --section-bg: #333; --border-color: #444; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; transition: background-color 0.3s ease; }
        .menu-container { background: var(--container-bg); padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; position: relative; transition: background-color 0.3s ease; }
        h1 { color: var(--text-color); margin-bottom: 5px; font-size: 1.5rem; }
        .theme-switch-wrapper { position: absolute; top: 25px; right: 25px; display: flex; align-items: center; }
        .theme-switch { display: inline-block; height: 24px; position: relative; width: 50px; }
        .theme-switch input { display:none; }
        .slider { background-color: #ccc; bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: white; bottom: 4px; content: ""; height: 16px; left: 4px; position: absolute; transition: .4s; width: 16px; border-radius: 50%; }
        input:checked + .slider { background-color: #3498db; }
        input:checked + .slider:before { transform: translateX(26px); }
        
        .quote-section { margin-bottom: 20px; padding: 10px; font-style: italic; border-bottom: 1px solid var(--border-color); }
        .quote-cn { color: var(--btn-bg); font-size: 1.1rem; font-weight: bold; }
        .quote-py { color: var(--subtitle-color); font-size: 0.85rem; }

        .progress-section { margin-bottom: 25px; background: var(--section-bg); padding: 15px; border-radius: 15px; border: 1px solid var(--border-color); }
        .progress-text { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: bold; color: var(--btn-bg); margin-bottom: 8px; }
        .bar-bg { width: 100%; height: 10px; background: var(--progress-bg); border-radius: 5px; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #3498db, #2ecc71); border-radius: 5px; transition: 0.8s ease-in-out; }
        
        .menu-btn { display: flex; justify-content: space-between; align-items: center; background: var(--btn-bg); color: white; text-decoration: none; padding: 18px 25px; border-radius: 15px; margin-bottom: 15px; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .menu-btn:hover { background: var(--btn-hover); transform: translateY(-3px); }
        .lesson-info { display: flex; flex-direction: column; text-align: left; }
        .cn-title { font-size: 1.1rem; color: white; }
        .mm-title { font-size: 0.8rem; font-weight: normal; opacity: 0.9; color: white; }
        .complete-toggle { margin-left: 15px; font-size: 1.2rem; background: rgba(255, 255, 255, 0.2); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: 0.3s; user-select: none; }
        
        /* Mastery Style */
        .menu-btn.mastered { background: #2ecc71; box-shadow: 0 0 15px rgba(46, 204, 113, 0.3); }
        
        .resume-btn { background: #2ecc71; color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; margin-bottom: 20px; font-weight: bold; cursor: pointer; display: none; }
        .footer { margin-top: 20px; color: var(--subtitle-color); font-size: 0.8rem; border-top: 1px solid var(--border-color); padding-top: 15px; }
    </style>
</head>
<body>

<div class="menu-container">
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider"></div>
        </label>
    </div>

    <h1>Level 2 Lessons</h1>

    <button id="resume-btn" class="resume-btn" onclick="resumeLesson()"></button>

    <div class="quote-section">
        <div class="quote-cn">加油!</div>
        <div class="quote-py">Jiāyóu! (Keep going!)</div>
    </div>

    <div class="progress-section">
        <div class="progress-text">
            <span>Course Progress</span>
            <span id="progress-count">0 / 5 Lessons</span>
        </div>
        <div class="bar-bg"><div id="progress-bar" class="bar-fill"></div></div>
    </div>
    
    <div id="lesson-list">
        <div class="menu-btn">
            <a href="lvl2lesson1.html" style="text-decoration:none; color:inherit; display:flex; flex-grow:1; justify-content:space-between; align-items:center;">
                <div class="lesson-info">
                    <span class="cn-title">爱好 (Àihào)</span>
                    <span class="mm-title">ဝါသနာ</span>
                </div>
            </a>
            <div class="complete-toggle" onclick="toggleStatus('L1', this)">○</div>
        </div>

        <div class="menu-btn">
            <a href="lvl2lesson2.html" style="text-decoration:none; color:inherit; display:flex; flex-grow:1; justify-content:space-between; align-items:center;">
                <div class="lesson-info">
                    <span class="cn-title">问路 (Wènlù)</span>
                    <span class="mm-title">လမ်းမေးခြင်း</span>
                </div>
            </a>
            <div class="complete-toggle" onclick="toggleStatus('L2', this)">○</div>
        </div>

        <div class="menu-btn">
            <a href="lvl2lesson3.html" style="text-decoration:none; color:inherit; display:flex; flex-grow:1; justify-content:space-between; align-items:center;">
                <div class="lesson-info">
                    <span class="cn-title">打电话 (Dǎ diànhuà)</span>
                    <span class="mm-title">ဖုန်းဆက်ခြင်း</span>
                </div>
            </a>
            <div class="complete-toggle" onclick="toggleStatus('L3', this)">○</div>
        </div>

        <div class="menu-btn">
            <a href="lvl2lesson4.html" style="text-decoration:none; color:inherit; display:flex; flex-grow:1; justify-content:space-between; align-items:center;">
                <div class="lesson-info">
                    <span class="cn-title">年龄 (Niánlíng)</span>
                    <span class="mm-title">အသက်အရွယ်</span>
                </div>
            </a>
            <div class="complete-toggle" onclick="toggleStatus('L4', this)">○</div>
        </div>

        <div class="menu-btn">
            <a href="lvl2lesson5.html" style="text-decoration:none; color:inherit; display:flex; flex-grow:1; justify-content:space-between; align-items:center;">
                <div class="lesson-info">
                    <span class="cn-title">天气 (Tiānqì)</span>
                    <span class="mm-title">မိုးလေဝသ</span>
                </div>
            </a>
            <div class="complete-toggle" onclick="toggleStatus('L5', this)">○</div>
        </div>
    </div>
    <div class="footer"></div>
</div>

<script>
    const totalLessons = 5;
    let completedLessons = JSON.parse(localStorage.getItem('completedList')) || [];

    // --- 1. THEME LOGIC ---
    const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        toggleSwitch.checked = true;
    }
    toggleSwitch.addEventListener('change', (e) => {
        const theme = e.target.checked ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    });

    // --- 2. UI UPDATE ---
    function updateUI() {
        const percentage = (completedLessons.length / totalLessons) * 100;
        document.getElementById('progress-bar').style.width = percentage + "%";
        document.getElementById('progress-count').innerText = `${completedLessons.length} / ${totalLessons} Lessons`;

        document.querySelectorAll('.menu-btn').forEach(btn => {
            const toggle = btn.querySelector('.complete-toggle');
            const id = toggle.getAttribute('onclick').match(/'([^']+)'/)[1];
            if (completedLessons.includes(id)) {
                toggle.innerText = "✓";
                btn.classList.add('mastered');
            } else {
                toggle.innerText = "○";
                btn.classList.remove('mastered');
            }
        });

        // Smart Resume Logic
        let next = 0;
        for (let i = 1; i <= totalLessons; i++) { if (!completedLessons.includes('L' + i)) { next = i; break; } }
        const rBtn = document.getElementById('resume-btn');
        if (next > 0) {
            rBtn.style.display = 'block';
            rBtn.innerText = `🚀 Continue: Lesson ${next}`;
            rBtn.onclick = () => window.location.href = `lvl2lesson${next}.html`;
        } else { rBtn.style.display = 'none'; }
    }

    function toggleStatus(id, el) {
        const index = completedLessons.indexOf(id);
        if (index === -1) completedLessons.push(id); else completedLessons.splice(index, 1);
        localStorage.setItem('completedList', JSON.stringify(completedLessons));
        updateUI();
    }

    updateUI();
</script>
</body>
</html>
