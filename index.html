<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESC Chinese - Level 2</title>
    <style>
        /* Define Dark Mode Variables */
        :root {
            --bg-color: #f0f2f5;
            --container-bg: white;
            --text-color: #2c3e50;
            --subtitle-color: #7f8c8d;
            --btn-bg: #3498db;
            --btn-hover: #2980b9;
            --progress-bg: #e0e0e0;
            --section-bg: #f8f9fa;
            --border-color: #eee;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #ecf0f1;
            --subtitle-color: #bdc3c7;
            --btn-bg: #2980b9;
            --btn-hover: #3498db;
            --progress-bg: #444;
            --section-bg: #333;
            --border-color: #444;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: background-color 0.3s ease;
        }
        
        .menu-container { 
            background: var(--container-bg); 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
            position: relative; 
            transition: background-color 0.3s ease;
        }

        h1 { color: var(--text-color); margin-bottom: 5px; font-size: 1.5rem; }

        .theme-switch-wrapper {
            position: absolute;
            top: 25px;
            right: 25px;
            display: flex;
            align-items: center;
        }
        .theme-switch {
            display: inline-block;
            height: 24px;
            position: relative;
            width: 50px;
        }
        .theme-switch input { display:none; }
        .slider {
            background-color: #ccc;
            bottom: 0;
            cursor: pointer;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            background-color: white;
            bottom: 4px;
            content: "";
            height: 16px;
            left: 4px;
            position: absolute;
            transition: .4s;
            width: 16px;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #3498db; }
        input:checked + .slider:before { transform: translateX(26px); }

        .quote-section {
            margin-bottom: 20px;
            padding: 10px;
            font-style: italic;
            border-bottom: 1px solid var(--border-color);
        }
        .quote-cn { color: var(--btn-bg); font-size: 1.1rem; font-weight: bold; }
        .quote-py { color: var(--subtitle-color); font-size: 0.85rem; }

        .progress-section {
            margin-bottom: 25px;
            background: var(--section-bg);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--btn-bg);
            margin-bottom: 8px;
        }
        .bar-bg {
            width: 100%;
            height: 10px;
            background: var(--progress-bg);
            border-radius: 5px;
            overflow: hidden;
        }
        .bar-fill {
            width: 21%; 
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            border-radius: 5px;
            transition: 0.5s;
        }

        .menu-btn { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--btn-bg); 
            color: white; 
            text-decoration: none; 
            padding: 18px 25px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            font-weight: bold; 
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .menu-btn:hover { 
            background: var(--btn-hover); 
            transform: translateY(-3px);
        }

        .lesson-info { display: flex; flex-direction: column; text-align: left; }
        .cn-title { font-size: 1.1rem; color: white; }
        .mm-title { font-size: 0.8rem; font-weight: normal; opacity: 0.9; color: white; }
        .lesson-num {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: white;
        }

        .footer { 
            margin-top: 20px; 
            color: var(--subtitle-color); 
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }
        .credit-text { display: block; margin-top: 8px; color: #95a5a6; font-size: 0.75rem; font-style: italic; }
    </style>
</head>
<body>

<div class="menu-container">
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider"></div>
        </label>
    </div>

    <h1>Level 2 Lessons</h1>

    <div class="quote-section" id="quote-container">
        <div class="quote-cn" id="quote-cn">加油!</div>
        <div class="quote-py" id="quote-py">Jiāyóu! (Keep going!)</div>
    </div>

    <div class="progress-section">
        <div class="progress-text">
            <span>Course Progress</span>
            <span>3 / 14 Lessons</span>
        </div>
        <div class="bar-bg">
            <div class="bar-fill"></div>
        </div>
    </div>
    
    <a href="lvl2lesson1.html" class="menu-btn" onclick="trackLesson('Lesson 1: 爱好')">
        <div class="lesson-info">
            <span class="cn-title">爱好 (Àihào)</span>
            <span class="mm-title">ဝါသနာ</span>
        </div>
        <span class="lesson-num">L-1</span>
    </a>

    <a href="lvl2lesson2.html" class="menu-btn" onclick="trackLesson('Lesson 2: 问路')">
        <div class="lesson-info">
            <span class="cn-title">问路 (Wènlù)</span>
            <span class="mm-title">လမ်းမေးခြင်း</span>
        </div>
        <span class="lesson-num">L-2</span>
    </a>

    <a href="lvl2lesson3.html" class="menu-btn" onclick="trackLesson('Lesson 3: 打电话')">
        <div class="lesson-info">
            <span class="cn-title">打电话 (Dǎ diànhuà)</span>
            <span class="mm-title">ဖုန်းဆက်ခြင်း</span>
        </div>
        <span class="lesson-num">L-3</span>
    </a>

    <div class="footer">
        <span class="credit-text">Created by GESC Student</span>
    </div>
</div>

<script>
    const webhookURL = 'https://discord.com/api/webhooks/1484870438944374834/hGWeMMgWwJ4iS4n9UxMlDi0FNfEFbLArmLdHkBXgy3stVDyy1Zk6bwz_Mx-dJ78YMDob';

    // --- TRACK LESSON CLICK ---
    function trackLesson(lessonName) {
        if (localStorage.getItem('is_developer')) return;
        fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: "Lesson Tracker",
                embeds: [{
                    title: "📖 Lesson Opened!",
                    color: 15844367,
                    description: `Someone is viewing: **${lessonName}**`,
                    footer: { text: `Time: ${new Date().toLocaleTimeString()}` }
                }]
            })
        }).catch(() => {});
    }

    // --- DARK MODE LOGIC ---
    const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
    const currentTheme = localStorage.getItem('theme');

    if (currentTheme) {
        document.documentElement.setAttribute('data-theme', currentTheme);
        if (currentTheme === 'dark') toggleSwitch.checked = true;
    }

    toggleSwitch.addEventListener('change', function(e) {
        const theme = e.target.checked ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    }, false);

    // --- QUOTE LOGIC ---
    const quotes = [{ cn: "加油!", py: "Jiāyóu! (Keep going!)" }];
    document.getElementById('quote-cn').innerText = quotes[0].cn;
    document.getElementById('quote-py').innerText = quotes[0].py;

    // --- INITIAL PAGE LOAD NOTIFICATION ---
    (function() {
        if (localStorage.getItem('is_developer')) return;

        const urlParams = new URLSearchParams(window.location.search);
        const source = urlParams.get('from') || 'Direct/Unknown';
        const userAgent = navigator.userAgent;
        const isPC = !/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(userAgent);
        
        fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: "App Monitor",
                embeds: [{
                    title: isPC ? "🚨 Possible Laoshi/PC Visit!" : "📱 Student/Mobile Visit",
                    color: isPC ? 15158332 : 3066993,
                    fields: [
                        { name: "Source", value: source, inline: true },
                        { name: "Device Type", value: isPC ? "Desktop/Laptop" : "Mobile Phone", inline: true },
                        { name: "Browser Info", value: `\`${userAgent.substring(0, 100)}...\`` }
                    ],
                    footer: { text: `Time: ${new Date().toLocaleString()}` }
                }]
            })
        }).catch(() => {});
    })();
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
