<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESC Chinese - Level 2</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .menu-container { 
            background: white; 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 450px; 
            text-align: center;
            /* အပေါ်ကနေ စတင်ပေါ်စေရန် align-self သုံးသည် */
            align-self: flex-start;
            margin-top: 20px;
        }

        h1 { 
            color: #2c3e50; 
            margin-bottom: 30px; 
            font-size: 1.6rem; 
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 15px;
        }

        .menu-btn { 
            display: block;
            background: #3498db; 
            color: white; 
            text-decoration: none; 
            padding: 20px; 
            border-radius: 18px; 
            margin-bottom: 18px; 
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.2);
            position: relative;
        }

        .menu-btn:hover { 
            background: #2980b9; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(52, 152, 219, 0.3);
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .cn-title { 
            font-size: 1.2rem; 
            font-weight: bold;
        }

        .lesson-num {
            background: rgba(255, 255, 255, 0.25);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .mm-title { 
            display: block;
            text-align: left;
            font-size: 0.9rem; 
            opacity: 0.9;
            margin-bottom: 10px;
        }

        /* Progress Bar Area */
        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            background: rgba(0, 0, 0, 0.1);
            padding: 6px 12px;
            border-radius: 10px;
            margin-top: 5px;
        }

        .footer { 
            margin-top: 30px; 
            color: #bdc3c7; 
            font-size: 0.85rem; 
            padding: 15px;
        }
    </style>
</head>
<body>

<div class="menu-container">
    <h1>GESC Chinese - Level 2</h1>
    
    <a href="lvl2lesson1.html" class="menu-btn">
        <div class="top-row">
            <span class="cn-title">爱好 (Àihào)</span>
            <span class="lesson-num">Lesson 1</span>
        </div>
        <span class="mm-title">ဝါသနာ</span>
        <div class="progress-info">
            <span>Learning Progress</span>
            <span>0 / 14</span>
        </div>
    </a>

    <a href="lvl2lesson2.html" class="menu-btn">
        <div class="top-row">
            <span class="cn-title">问路 (Wènlù)</span>
            <span class="lesson-num">Lesson 2</span>
        </div>
        <span class="mm-title">လမ်းမေးခြင်း</span>
        <div class="progress-info">
            <span>Learning Progress</span>
            <span>0 / 18</span>
        </div>
    </a>

    <a href="lvl2lesson3.html" class="menu-btn">
        <div class="top-row">
            <span class="cn-title">打电话 (Dǎ diànhuà)</span>
            <span class="lesson-num">Lesson 3</span>
        </div>
        <span class="mm-title">ဖုန်းဆက်ခြင်း</span>
        <div class="progress-info">
            <span>Learning Progress</span>
            <span>0 / 17</span>
        </div>
    </a>

    <div class="footer">
        နောင်ထပ် သင်ခန်းစာများကိုလည်း မကြာမီ ထည့်သွင်းပေးပါမည်။
    </div>
</div>

</body>
</html>
