<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESC Chinese - Level 2</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .menu-container { 
            background: white; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        h1 { color: #2c3e50; margin-bottom: 25px; font-size: 1.5rem; }

        .menu-btn { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #3498db; 
            color: white; 
            text-decoration: none; 
            padding: 18px 25px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            font-weight: bold; 
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .menu-btn:hover { 
            background: #2980b9; 
            transform: translateY(-3px);
        }

        .lesson-info {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .cn-title { font-size: 1.1rem; }
        .mm-title { font-size: 0.8rem; font-weight: normal; opacity: 0.9; }

        .lesson-num {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
        }

        .footer { 
            margin-top: 25px; 
            color: #bdc3c7; 
            font-size: 0.85rem; 
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="menu-container">
    <h1>GESC Chinese - Level 2</h1>
    
    <a href="lvl2lesson1.html" class="menu-btn">
        <div class="lesson-info">
            <span class="cn-title">爱好 (Àihào)</span>
            <span class="mm-title">ဝါသနာ</span>
        </div>
        <span class="lesson-num">Lesson 1</span>
    </a>

    <a href="lvl2lesson2.html" class="menu-btn">
        <div class="lesson-info">
            <span class="cn-title">问路 (Wènlù)</span>
            <span class="mm-title">လမ်းမေးခြင်း</span>
        </div>
        <span class="lesson-num">Lesson 2</span>
    </a>

    <a href="lvl2lesson3.html" class="menu-btn">
        <div class="lesson-info">
            <span class="cn-title">打电话 (Dǎ diànhuà)</span>
            <span class="mm-title">ဖုန်းဆက်ခြင်း</span>
        </div>
        <span class="lesson-num">Lesson 3</span>
    </a>

    <div class="footer">
        Select a lesson to start practice
    </div>
</div>

</body>
</html>
