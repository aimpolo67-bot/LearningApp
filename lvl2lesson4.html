        },
        { 
            cn: "你父母今年多大年纪？", 
            py: "Nǐ fùmǔ jīnnián duōdà niánjì?", 
            mm: "မင်းမိဘတွေဒီနှစ်အသက်ဘယ်လောက်ရှိပြီလဲ?", 
            pyParts: [{w:"Nǐ"}, {w:"fùmǔ"}, {w:"jīnnián"}, {w:"duōdà"}, {w:"niánjì?"}] 
        },
        { 
            cn: "你读大学什么专业？", 
            py: "Nǐ dú dàxué shénme zhuānyè?", 
            mm: "မင်းတက္ကသိုလ်မှာ ဘယ်မေဂျာကိုတက်နေတာလဲ?", 
            pyParts: [{w:"Nǐ"}, {w:"dú"}, {w:"dàxué"}, {w:"shénme"}, {w:"zhuānyè?"}] 
        },
        { 
            cn: "我的梦想是成为一位老师。", 
            py: "Wǒ de mèngxiǎng shì chéngwéi yí wèi lǎoshī.", 
            mm: "ကျွန်တော့်ရဲ့အိပ်မက်က ဆရာတစ်ယောက်ဖြစ်လာဖို့ပါ။", 
            pyParts: [{w:"Wǒ de"}, {w:"mèngxiǎng"}, {w:"shì"}, {w:"chéngwéi"}, {w:"yí wèi"}, {w:"lǎoshī."}] 
        }
    ]
};


    // Rest of your game logic is untouched below...
    let currentLevel = 1, pool = [], currentIndex = 0, currentItem = {}, buildResult = [], canClick = true;
    let errorCount = 0, correctCount = 0, currentStreak = 0, maxStreak = 0, startTime = 0;
    let missedItems = [], initialPoolSize = 0;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function triggerShake() {
        const container = document.getElementById('quiz-container');
        container.classList.add('shake');
        setTimeout(() => container.classList.remove('shake'), 300);
    }

    function showMainMenu() {
        document.getElementById('menu-screen').style.display = "block";
        document.getElementById('game-screen').style.display = "none";
        document.getElementById('summary-screen').style.display = "none";
    }

    function goToLevel(lvl) {
        currentLevel = lvl; currentIndex = 0; errorCount = 0; correctCount = 0; currentStreak = 0; maxStreak = 0;
        missedItems = []; startTime = Date.now();
        document.getElementById('menu-screen').style.display = "none";
        document.getElementById('game-screen').style.display = "block";
        document.getElementById('summary-screen').style.display = "none";
        let rawPool = (lvl === 1) ? [...CONFIG.vocab] : [...CONFIG.sentences];
        pool = shuffleArray(rawPool);
        initialPoolSize = pool.length;
        if (lvl === 1) { document.getElementById('level-tag').innerText = "Shēngcí (生词)"; document.getElementById('lvl3-controls').style.display = "none"; }
        else if (lvl === 2) { document.getElementById('level-tag').innerText = "Duìhuà (对话)"; document.getElementById('lvl3-controls').style.display = "none"; }
        else { document.getElementById('level-tag').innerText = "Páijùzi (排句子)"; document.getElementById('lvl3-controls').style.display = "flex"; }
        updateQuestion();
    }

    function updateQuestion() {
        canClick = true;
        document.getElementById('next-btn').style.display = "none";
        const fb = document.getElementById('feedback');
        fb.innerText = ""; fb.className = ""; fb.style.background = "transparent";
        document.getElementById('user-build').innerHTML = "";
        document.getElementById('options').innerHTML = "";
        document.getElementById('scrambled-words').innerHTML = "";
        document.getElementById('cn-hint-text').innerText = "";
        
        if(currentLevel === 3) {
            document.getElementById('undo-btn').disabled = false;
            document.getElementById('reset-btn').disabled = false;
            document.getElementById('hint-btn').disabled = false;
        }

        buildResult = [];
        const progressPct = Math.min(((currentIndex) / initialPoolSize) * 100, 99);
        document.getElementById('progress-fill').style.width = progressPct + "%";
        document.getElementById('progress-info').innerText = `Item: ${currentIndex + 1} / ${pool.length}`;
        currentItem = pool[currentIndex];
        if (currentLevel < 3) {
            document.getElementById('level-1-2-ui').style.display = "block";
            document.getElementById('level-3-ui').style.display = "none";
            document.getElementById('cn-q').innerText = currentItem.cn;
            document.getElementById('py-q').innerText = currentItem.py;
            renderOptions();
        } else {
            document.getElementById('level-1-2-ui').style.display = "none";
            document.getElementById('level-3-ui').style.display = "block";
            document.getElementById('mm-hint').innerText = currentItem.mm;
            renderScramble();
        }
    }

    function renderOptions() {
        let choices = [currentItem.mm];
        let wrongSource = (currentLevel === 1) ? CONFIG.vocab : CONFIG.sentences;
        let wrongOptions = wrongSource.filter(item => item.mm !== currentItem.mm);
        shuffleArray(wrongOptions);
        while (choices.length < 4 && wrongOptions.length > 0) {
            let r = wrongOptions.pop().mm;
            if (!choices.includes(r)) choices.push(r);
        }
        shuffleArray(choices);
        choices.forEach(c => {
            const b = document.createElement('button');
            b.innerText = c;
            b.onclick = () => handleChoice(c, b);
            document.getElementById('options').appendChild(b);
        });
    }

    function handleChoice(selected, btn) {
    if (!canClick) return;
    canClick = false;
    const allBtns = document.querySelectorAll('#options button');
    allBtns.forEach(b => b.disabled = true);
    const fb = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');

    if (selected === currentItem.mm) {
        btn.classList.add('btn-correct');
        fb.className = "feedback-correct";
        fb.innerHTML = `<span>Correct! ✓</span>`;
        correctCount++;
        updateStreak(true);
        
        // --- ADDED THIS LINE FOR SUCCESS ---
        trackActivity(`L2-L1 (Level ${currentLevel})`, currentItem.cn, true);
        
        nextBtn.style.display = "block";
    } else {
        btn.classList.add('btn-wrong'); 
        allBtns.forEach(b => { if (b.innerText === currentItem.mm) b.classList.add('btn-correct'); });
        triggerShake();
        errorCount++;
        let reIndex = currentIndex + 4;
        if(reIndex > pool.length) reIndex = pool.length;
        pool.splice(reIndex, 0, currentItem);
        if (!missedItems.includes(currentItem)) missedItems.push(currentItem);
        updateStreak(false);
        fb.className = "feedback-wrong-box";
        fb.innerHTML = `<span>✘ Wrong</span><br><span style="font-size:0.9rem;">Correct: ${currentItem.mm}</span>`;
        
        // --- ADDED THIS LINE FOR MISTAKES ---
        trackActivity(`L2-L1 (Level ${currentLevel})`, currentItem.cn, false);
        
        nextBtn.style.display = "block";
    }
}

    function renderScramble() {
        let pinyinParts = shuffleArray(currentItem.pyParts.map((obj, i) => {
            return {w: obj.w, t: obj.t || 'default', id: i};
        }));
        pinyinParts.forEach(partObj => {
            const b = document.createElement('button');
            b.innerText = partObj.w; 
            b.className = `pinyin-part part-${partObj.t}`;
            b.onclick = () => {
                if(!canClick || b.disabled) return;
                b.disabled = true;
                buildResult.push(partObj.w);
                const slot = document.createElement('span');
                slot.innerText = partObj.w;
                slot.className = 'slot-item';
                document.getElementById('user-build').appendChild(slot);
                if (buildResult.length === currentItem.pyParts.length) checkSentence();
            };
            document.getElementById('scrambled-words').appendChild(b);
        });
    }

    function checkSentence() {
        canClick = false;
        const userStr = buildResult.join(" ").replace(/\s+([,.!?])/g, '$1');
        const correctStr = currentItem.pyParts.map(p => p.w).join(" ").replace(/\s+([,.!?])/g, '$1');
        const fb = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');

        document.getElementById('undo-btn').disabled = true;
        document.getElementById('reset-btn').disabled = true;
        document.getElementById('hint-btn').disabled = true;

        if (userStr === correctStr) {
            fb.className = "feedback-correct";
            fb.innerHTML = `<span>Correct! ✓</span><br><small>${currentItem.py}</small>`;
            correctCount++;
            updateStreak(true);

            // --- ADD THIS FOR LEVEL 3 SUCCESS ---
            trackActivity(`L2-L1 (Level ${currentLevel})`, currentItem.cn, true);

            nextBtn.style.display = "block";
        } else {
            triggerShake();
            errorCount++;
            let reIndex = currentIndex + 3;
            if(reIndex > pool.length) reIndex = pool.length;
            pool.splice(reIndex, 0, currentItem);
            if (!missedItems.includes(currentItem)) missedItems.push(currentItem);
            updateStreak(false);
            fb.className = "feedback-wrong-box";
            fb.innerHTML = `<span>✘ Wrong Order</span><br><small>Correct: ${correctStr}</small>`;

            // --- ADD THIS FOR LEVEL 3 MISTAKE ---
            trackActivity(`L2-L1 (Level ${currentLevel})`, currentItem.cn, false);

            nextBtn.style.display = "block";
        }
    }

    function autoNext() {
        currentIndex++;
        if (currentIndex < pool.length) updateQuestion();
        else showSummary();
    }

    function updateStreak(isCorrect) {
        if (isCorrect) {
            currentStreak++;
            if (currentStreak > maxStreak) maxStreak = currentStreak;
            if (currentStreak >= 3) {
                const s = document.getElementById('streak-display');
                s.innerText = `🔥 ${currentStreak} Streak!`;
                s.style.transform = "scale(1.2)";
                setTimeout(() => s.style.transform = "scale(1)", 200);
            }
        } else {
            currentStreak = 0;
            document.getElementById('streak-display').innerText = "";
        }
    }

    function undoLast() {
        if (!canClick || buildResult.length === 0) return;
        const lastWord = buildResult.pop();
        const display = document.getElementById('user-build');
        display.removeChild(display.lastChild);
        const btns = document.querySelectorAll('#scrambled-words button');
        for (let b of btns) {
            if (b.innerText === lastWord && b.disabled) {
                b.disabled = false;
                break;
            }
        }
    }

    function resetSentence() {
        if (!canClick) return;
        buildResult = [];
        document.getElementById('user-build').innerHTML = "";
        document.querySelectorAll('#scrambled-words button').forEach(b => b.disabled = false);
    }

    function showHint() {
        document.getElementById('cn-hint-text').innerText = currentItem.cn;
    }
function showSummary() {
    document.getElementById('game-screen').style.display = "none";
    document.getElementById('summary-screen').style.display = "block";
    document.getElementById('progress-fill').style.width = "100%";

    const accuracy = Math.round((initialPoolSize / (initialPoolSize + errorCount)) * 100) || 0;
    const timeSpent = Math.floor((Date.now() - startTime) / 1000);

    // --- TRACKER INTEGRATION ---
    trackActivity(
        `FINISH: Level ${currentLevel}`, 
        `Accuracy: ${accuracy}% | Mistakes: ${errorCount} | Time: ${timeSpent}s`, 
        accuracy >= 80
    );
    // ---------------------------

    document.getElementById('accuracy-pct').innerText = accuracy + "%";
    let stars = accuracy === 100 ? "⭐⭐⭐" : accuracy >= 70 ? "⭐⭐" : accuracy >= 50 ? "⭐" : "Try Again!";
    const starEl = document.getElementById('star-rating');
    starEl.innerText = stars;
    starEl.className = accuracy < 50 ? "no-stars" : "";
    
    document.getElementById('summary-stats').innerHTML = `Mistakes: ${errorCount}<br>Best Streak: ${maxStreak}<br>Time: ${timeSpent}s`;
    
    if (missedItems.length > 0) {
        document.getElementById('review-container').style.display = "block";
        const list = document.getElementById('review-list');
        list.innerHTML = "";
        missedItems.forEach(item => {
            const div = document.createElement('div');
            div.className = "review-item";
            div.innerHTML = `<div class="review-cn">${item.cn} (${item.py})</div><div class="review-mm">${item.mm}</div>`;
            list.appendChild(div);
        });
    }
}
    showMainMenu();
</script>
