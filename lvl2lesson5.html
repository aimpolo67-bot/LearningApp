        { cn: "今年的暑假你有什么安排？", py: "Jīnnián de shǔjià nǐ yǒu shénme ānpái?", mm: "ဒီနှစ် နွေရာသီကျောင်းပိတ်ရက်မှာ မင်း ဘာအစီအစဉ်ရှိလဲ?", pyParts: [{w:"Jīnnián de"}, {w:"shǔjià"}, {w:"nǐ"}, {w:"yǒu shénme"}, {w:"ānpái?"}] },
        { cn: "小鸟在天空上飞来飞去。", py: "Xiǎoniǎo zài tiānkōng shàng fēi lái fēi qù.", mm: "ငှက်ကလေးတွေ ကောင်းကင်ပေါ်မှာ ပျံသွားပျံလာ ပျံသန်းနေကြသည်။", pyParts: [{w:"Xiǎoniǎo"}, {w:"zài"}, {w:"tiānkōng"}, {w:"shàng"}, {w:"fēi lái"}, {w:"fēi qù."}] },
        { cn: "我一紧张就出汗。", py: "Wǒ yī jǐnzhāng jiù chūhàn.", mm: "ငါ စိတ်လှုပ်ရှားတာနဲ့ ချွေးထွက်လာတယ်။", pyParts: [{w:"Wǒ"}, {w:"yī"}, {w:"jǐnzhāng"}, {w:"jiù"}, {w:"chūhàn."}] },
        { cn: "天气预报说下周会有台风。", py: "Tiānqì yùbào shuō xiàzhōu huì yǒu táifēng.", mm: "မိုးလေဝသခန့်မှန်းချက်အရ နောက်အပတ်မှာ မုန်တိုင်းရှိမယ်လို့ ပြောတယ်။", pyParts: [{w:"Tiānqì"}, {w:"yùbào"}, {w:"shuō"}, {w:"xiàzhōu"}, {w:"huì yǒu"}, {w:"táifēng."}] },
        { cn: "今天很热，所以我出了很多汗。", py: "Jīntiān hěn rè, suǒyǐ wǒ chūle hěnduō hàn.", mm: "ဒီနေ့ အရမ်းပူတယ်၊ ဒါကြောင့် ငါ ချွေးတွေ အများကြီး ထွက်လာတယ်။", pyParts: [{w:"Jīntiān"}, {w:"hěn rè,"}, {w:"suǒyǐ"}, {w:"wǒ"}, {w:"chūle"}, {w:"hěnduō"}, {w:"hàn."}] },
        { cn: "下周有台风，所以学校放假。", py: "Xiàzhōu yǒu táifēng, suǒyǐ xuéxiào fàngjià.", mm: "နောက်အပတ်မှာ မုန်တိုင်းရှိလို့ ကျောင်းပိတ်တယ်။", pyParts: [{w:"Xiàzhōu"}, {w:"yǒu"}, {w:"táifēng,"}, {w:"suǒyǐ"}, {w:"xuéxiào"}, {w:"fàngjià."}] },
        { cn: "我很害怕打雷声。", py: "Wǒ hěn hàipà dǎléishēng.", mm: "ငါ မိုးကျိုးပစ်သံကို အရမ်းကြောက်တယ်။", pyParts: [{w:"Wǒ"}, {w:"hěn"}, {w:"hàipà"}, {w:"dǎléishēng."}] },
        { cn: "他中暑了，所以在家休息。", py: "Tā zhòngshǔle, suǒyǐ zài jiā xiūxi.", mm: "သူ အပူလျှပ်သွားလို့ အိမ်မှာ အနားယူနေတယ်။", pyParts: [{w:"Tā"}, {w:"zhòngshǔle,"}, {w:"suǒyǐ"}, {w:"zài jiā"}, {w:"xiūxi."}] },
        { cn: "夏天很容易中暑，大家要小心。", py: "Xiàtiān hěn róngyì zhòngshǔ, dàjiā yào xiǎoxīn.", mm: "နွေရာသီမှာ အပူလျှပ်ဖို့ အရမ်းလွယ်ကူတယ်၊ အားလုံးပဲ သတိထားကြပါ။", pyParts: [{w:"Xiàtiān"}, {w:"hěn róngyì"}, {w:"zhòngshǔ,"}, {w:"dàjiā"}, {w:"yào"}, {w:"xiǎoxīn."}] }
    ]
};
    let currentLevel = 1, pool = [], currentIndex = 0, currentItem = {}, buildResult = [], canClick = true;
    let errorCount = 0, correctCount = 0, currentStreak = 0, maxStreak = 0, startTime = 0, missedItems = [], initialPoolSize = 0;
    let currentSpeechRate = 0.7;

    // --- SPEED SYNC LOGIC ---
    function syncSpeed(val) {
        currentSpeechRate = parseFloat(val);
        document.getElementById('global-speed-study').value = val;
        document.getElementById('global-speed-game').value = val;
    }

    // --- TTS FUNCTION (MANUAL SPEED) ---
    function speakCustom(text) {
        window.speechSynthesis.cancel();
        setTimeout(() => {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'zh-CN';
            msg.rate = currentSpeechRate; // Uses value from slider
            msg.pitch = 1.0;
            window.speechSynthesis.speak(msg);
        }, 50);
    }

    // --- FLASHCARD LOGIC ---
    function showStudyMode() {
        document.getElementById('menu-screen').style.display = "none";
        document.getElementById('study-screen').style.display = "block";
        const list = document.getElementById('flashcard-list');
        list.innerHTML = "";
        CONFIG.vocab.forEach(item => {
            const card = document.createElement('div');
            card.className = "flashcard";
            const content = document.createElement('div');
            content.className = "flashcard-content";
            content.innerHTML = `${item.cn}<br><small>${item.py}</small>`;
            const speaker = document.createElement('button');
            speaker.className = "study-speaker-btn";
            speaker.innerHTML = "🔊 Hear";
            speaker.onclick = (e) => { e.stopPropagation(); speakCustom(item.cn); };
            card.onclick = () => {
                if (content.innerHTML.includes(item.cn)) content.innerHTML = `<span style="color: #3498db;">${item.mm}</span>`;
                else content.innerHTML = `${item.cn}<br><small>${item.py}</small>`;
            };
            card.appendChild(content); card.appendChild(speaker); list.appendChild(card);
        });
    }

    function showMainMenu() {
        document.getElementById('menu-screen').style.display = "block";
        document.getElementById('study-screen').style.display = "none";
        document.getElementById('game-screen').style.display = "none";
        document.getElementById('summary-screen').style.display = "none";
    }

    function speakText(isSentence = false) { speakCustom(currentItem.cn); }

    function retryMistakes() {
        pool = shuffleArray([...missedItems]); initialPoolSize = pool.length;
        currentIndex = 0; errorCount = 0; missedItems = [];
        document.getElementById('summary-screen').style.display = "none";
        document.getElementById('game-screen').style.display = "block";
        updateQuestion();
    }
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }
    function triggerShake() {
        const container = document.getElementById('quiz-container');
        container.classList.add('shake');
        setTimeout(() => container.classList.remove('shake'), 300);
    }
    function goToLevel(lvl) {
        currentLevel = lvl; currentIndex = 0; errorCount = 0; correctCount = 0; currentStreak = 0; maxStreak = 0;
        missedItems = []; startTime = Date.now();
        document.getElementById('menu-screen').style.display = "none";
        document.getElementById('game-screen').style.display = "block";
        let rawPool = (lvl === 1) ? [...CONFIG.vocab] : [...CONFIG.sentences];
        pool = shuffleArray(rawPool);
        initialPoolSize = pool.length;
        if (lvl === 1) document.getElementById('level-tag').innerText = "Shēngcí (生词)";
        else if (lvl === 2) document.getElementById('level-tag').innerText = "Duìhuà (对话)";
        else document.getElementById('level-tag').innerText = "Páijùzi (排句子)";
        document.getElementById('lvl3-controls').style.display = (lvl === 3) ? "flex" : "none";
        updateQuestion();
    }
    function updateQuestion() {
        canClick = true; document.getElementById('next-btn').style.display = "none";
        const fb = document.getElementById('feedback'); fb.innerText = ""; fb.className = "";
        document.getElementById('user-build').innerHTML = ""; document.getElementById('options').innerHTML = "";
        document.getElementById('scrambled-words').innerHTML = ""; document.getElementById('cn-hint-text').innerText = "";
        buildResult = [];
        const progressPct = Math.min(((currentIndex) / initialPoolSize) * 100, 99);
        document.getElementById('progress-fill').style.width = progressPct + "%";
        document.getElementById('progress-info').innerText = `Item: ${currentIndex + 1} / ${pool.length}`;
        currentItem = pool[currentIndex];
        if (currentLevel < 3) {
            document.getElementById('level-1-2-ui').style.display = "block";
            document.getElementById('level-3-ui').style.display = "none";
            document.getElementById('cn-q').innerText = currentItem.cn;
            document.getElementById('py-q').innerText = currentItem.py;
            renderOptions();
        } else {
            document.getElementById('level-1-2-ui').style.display = "none";
            document.getElementById('level-3-ui').style.display = "block";
            document.getElementById('mm-hint').innerText = currentItem.mm;
            renderScramble();
        }
    }
    function renderOptions() {
        let choices = [currentItem.mm];
        let wrongSource = (currentLevel === 1) ? CONFIG.vocab : CONFIG.sentences;
        let wrongOptions = wrongSource.filter(item => item.mm !== currentItem.mm);
        shuffleArray(wrongOptions);
        while (choices.length < 4 && wrongOptions.length > 0) {
            let r = wrongOptions.pop().mm;
            if (!choices.includes(r)) choices.push(r);
        }
        shuffleArray(choices);
        choices.forEach(c => {
            const b = document.createElement('button');
            b.innerText = c; b.onclick = () => handleChoice(c, b);
            document.getElementById('options').appendChild(b);
        });
    }
    function handleChoice(selected, btn) {
        if (!canClick) return;
        canClick = false;
        const allBtns = document.querySelectorAll('#options button');
        const fb = document.getElementById('feedback');
        if (selected === currentItem.mm) {
            btn.classList.add('btn-correct'); fb.className = "feedback-correct"; fb.innerHTML = `<span>Correct! ✓</span>`;
            correctCount++; updateStreak(true);
        } else {
            btn.classList.add('btn-wrong'); allBtns.forEach(b => { if (b.innerText === currentItem.mm) b.classList.add('btn-correct'); });
            triggerShake(); errorCount++;
            if (!missedItems.some(i => i.cn === currentItem.cn)) missedItems.push(currentItem);
            updateStreak(false); fb.className = "feedback-wrong-box";
            fb.innerHTML = `<span>✘ Wrong</span><br><small>Correct: ${currentItem.mm}</small>`;
        }
        document.getElementById('next-btn').style.display = "block";
    }
    function renderScramble() {
        let pinyinParts = shuffleArray(currentItem.pyParts.map((obj, i) => ({w: obj.w, id: i})));
        pinyinParts.forEach(partObj => {
            const b = document.createElement('button');
            b.innerText = partObj.w; b.className = `pinyin-part`;
            b.onclick = () => {
                if(!canClick || b.disabled) return;
                b.disabled = true; buildResult.push(partObj.w);
                const slot = document.createElement('span'); slot.innerText = partObj.w;
                document.getElementById('user-build').appendChild(slot);
                if (buildResult.length === currentItem.pyParts.length) checkSentence();
            };
            document.getElementById('scrambled-words').appendChild(b);
        });
    }
    function checkSentence() {
        canClick = false;
        const userStr = buildResult.join(" ").replace(/\s+([,.!?])/g, '$1');
        const correctStr = currentItem.pyParts.map(p => p.w).join(" ").replace(/\s+([,.!?])/g, '$1');
        const fb = document.getElementById('feedback');
        if (userStr === correctStr) {
            fb.className = "feedback-correct"; fb.innerHTML = `<span>Correct! ✓</span>`;
            correctCount++; updateStreak(true);
        } else {
            triggerShake(); errorCount++;
            if (!missedItems.some(i => i.cn === currentItem.cn)) missedItems.push(currentItem);
            updateStreak(false); fb.className = "feedback-wrong-box";
            fb.innerHTML = `<span>✘ Wrong Order</span><br><small>${correctStr}</small>`;
        }
        document.getElementById('next-btn').style.display = "block";
    }
    function autoNext() { currentIndex++; if (currentIndex < pool.length) updateQuestion(); else showSummary(); }
    function updateStreak(isCorrect) {
        if (isCorrect) {
            currentStreak++; if (currentStreak > maxStreak) maxStreak = currentStreak;
            if (currentStreak >= 3) document.getElementById('streak-display').innerText = `🔥 ${currentStreak} Streak!`;
        } else {
            currentStreak = 0; document.getElementById('streak-display').innerText = "";
        }
    }
    function undoLast() {
        if (!canClick || buildResult.length === 0) return;
        const lastWord = buildResult.pop();
        const display = document.getElementById('user-build'); display.removeChild(display.lastChild);
        const btns = document.querySelectorAll('#scrambled-words button');
        for (let b of btns) { if (b.innerText === lastWord && b.disabled) { b.disabled = false; break; } }
    }
    function resetSentence() {
        if (!canClick) return; buildResult = []; document.getElementById('user-build').innerHTML = "";
        document.querySelectorAll('#scrambled-words button').forEach(b => b.disabled = false);
    }
    function showHint() { document.getElementById('cn-hint-text').innerText = currentItem.cn; }
    function showSummary() {
        document.getElementById('game-screen').style.display = "none";
        document.getElementById('summary-screen').style.display = "block";
        const accuracy = Math.round((initialPoolSize / (initialPoolSize + errorCount)) * 100) || 0;
        document.getElementById('accuracy-pct').innerText = accuracy + "%";
        document.getElementById('star-rating').innerText = accuracy === 100 ? "⭐⭐⭐" : accuracy >= 70 ? "⭐⭐" : accuracy >= 50 ? "⭐" : "Try Again!";
        document.getElementById('summary-stats').innerHTML = `Mistakes: ${errorCount}<br>Streak: ${maxStreak}`;
        if (missedItems.length > 0) {
            document.getElementById('review-container').style.display = "block";
            const list = document.getElementById('review-list'); list.innerHTML = "";
            missedItems.forEach(item => {
                const div = document.createElement('div'); div.className = "review-item";
                div.innerHTML = `<b>${item.cn}</b><br><small>${item.mm}</small>`;
                list.appendChild(div);
            });
        } else { document.getElementById('review-container').style.display = "none"; }
    }
    showMainMenu();
</script>
